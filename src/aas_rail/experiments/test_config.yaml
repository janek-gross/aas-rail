dataset: aasx_sample
evaluation: dummy_metric
tool:
  name: template_ie
  architecture:
    name: schema_ie_rag # one of schema_ie, schema_ie_rag
    embedding_generator:
      client: openai
      model: "text-embedding-3-small"
      chunk_size: 200
      chunk_overlap: 50
    vector_store:
      name: chroma
    query_generator:
      batch_size: 5
      n_queries_per_property: 5
      top_k: 5
      n_chunks: 10
      schema: retrieve_factory
      client: ollama
      model: gpt-oss:20b
      prompt:
        type: manual
        id: v0
    schema_based_extractor:
      client: ollama
      model: gpt-oss:20b
      temperature: 0.0
      prompt_degradation_intensity: 0.0

      prompt:
        type: manual
        id: v0
      schema: aasx_factory

